name: iCLONE Daily Training

# GAME Cloud — DEPRECATED (June 2026)
# Agent creation: app.virtuals.io → Create Agent
# ACP SDK: virtuals-acp (PyPI) — active replacement
# API key obtained after registering agent on app.virtuals.io

on:
  schedule:
    # Morning session — 07:00 UTC
    - cron: '0 7 * * *'
    # Evening session — 19:00 UTC
    - cron: '0 19 * * *'
  # Manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      session_note:
        description: 'Optional note for this training session'
        required: false
        default: 'Manual trigger'

jobs:
  train:
    name: iCLONE Training Session
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run training scheduler
        env:
          # Add these in: GitHub → Settings → Secrets → Actions
          # ANTHROPIC_API_KEY  → console.anthropic.com/settings/keys
          # VIRTUALS_API_KEY   → obtained after creating agent on app.virtuals.io
          # VIRTUALS_AGENT_ID  → obtained after creating agent on app.virtuals.io
          # AGENT_WALLET_ADDRESS → 0x44cc25d55a4291b92f52062ba023ca1f14206664
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VIRTUALS_API_KEY: ${{ secrets.VIRTUALS_API_KEY }}
          VIRTUALS_AGENT_ID: ${{ secrets.VIRTUALS_AGENT_ID }}
          AGENT_WALLET_ADDRESS: ${{ secrets.AGENT_WALLET_ADDRESS }}
          NODE_ENV: production
        run: PYTHONPATH=. python -m agent.iclone.training.scheduler

      - name: Install dev dependencies
        run: pip install -r agent/requirements-dev.txt

      - name: Run TDD suite after training
        run: PYTHONPATH=. pytest agent/iclone/tests/ -v --tb=short

      - name: Log training completion
        if: always()
        run: |
          echo "=================================="
          echo "iCLONE Training — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Session: ${{ github.event.inputs.session_note || 'Scheduled' }}"
          echo "=================================="
